<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historico</title>
    <link rel="stylesheet" href="painel.css">
</head>
<body>
    <div class="dashboard-container">
        <aside class="sidebar">
            <div class="logo">
                <img src="img/logo1.png" alt="Logo da empresa" style="max-width: 150px; margin-bottom: 20px; display: flex; margin-left: auto; margin-right: auto;">
            </div>

            <nav class="menu">
                <a href="painel.html" class="menu-item active"><span>📊</span> Dashboard</a>
                <a href="estoque.html" class="menu-item"><span>📦</span> Estoque & Produtos</a>
                <a href="caixa.html" class="menu-item"><span>💵</span> Caixa</a>
                <a href="vendas.html" class="menu-item"><span>💰</span> Histórico de Vendas</a>
                <a href="#" class="menu-item"><span>👥</span> Usuários</a>
                <a href="#" class="menu-item"><span>⚙️</span> Configurações</a>
            </nav>

            <div class="logout-area">
                <a href="login.html" class="btn-sair">Sair do Sistema</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="title">
                    <h2>Histórico Geral de Vendas</h2>
                </div>

                <div class="user-info">
                    <span class="status-dot"></span>
                    <span>Olá, <strong>Junior</strong></span>
                </div>

            </header>

            <div style="margin-top: 30px; margin-bottom: 20px;">
                <h3 style="color: white;">Todas as vendas Registradas</h3>
                <p style="color: #aaa; font-size: 14px;">Acompanhe o fluxo de caixa detalhado da loja.</p>
            </div>

            <section class="table-container" style="background-color: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333;">
                <table style="width: 100%; text-align: left; border-collapse: collapse; color: white;">
                    <thead>
                        <tr style="border-bottom: 2px solid #ff9900;">
                            <th style="padding: 15px 10px;">ID VENDA</th>
                            <th style="padding: 15px 10px;">DATA E HORA</th>
                            <th style="padding: 15px 10px;">CLIENTE</th>
                            <th style="padding: 15px 10px;">TOTAL</th>
                            <th style="padding: 15px 10px;">FORMA DE PAGAMENTO</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-vendas-body">

                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <script src="vendas.js"></script>
</body>
</html>
