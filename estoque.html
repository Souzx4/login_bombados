<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estoque</title>
    <link rel="stylesheet" href="painel.css">
</head>

<body>
    <div class="dashboard-container">

        <aside class="sidebar">
            <div class="logo-area">
                <img src="img/logo1.png" alt="Bombado Logo">
            </div>

            <nav class="menu">
                <a href="painel.html" class="menu-item"><span>📊</span> Dashboard</a>
                <a href="estoque.html" class="menu-item active" style="color: #ff9900;"><span>📦</span> Estoque & Produtos</a>
                <a href="caixa.html" class="menu-item"><span>💵</span> Caixa</a>
                <a href="vendas.html" class="menu-item"><span>💰</span> Histórico de Vendas</a>
                <a href="fiados.html" class="menu-item ">📒 Contas a Receber</a>
                <a href="usuarios.html" class="menu-item"><span>👥</span> Usuários</a>
                <a href="rh.html" class="menu-item"><span>📈</span> RH & Comissões</a>
            </nav>

            <div class="logout-area">
                <a href="login.html" class="btn-sair">Sair do Sistema</a>
            </div>
        </aside>

        <main class="main-content">
            <header class="header">
                <div class="title">
                    <h2>Gestão de Estoque</h2>
                </div>
                <div class="user-info">
                    <span class="status-dot"></span>
                    <span>Olá, <strong>Junior</strong></span>
                </div>
            </header>

            <div
                style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px; margin-bottom: 20px;">
                <h3 style style="color: white;">Lista de Produtos Cadastrados</h3>
                <button id="btn-novo-produto"
                    style="background-color: #ff9900; color: #121212; padding: 10px 20px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;">+
                    Novo Produto</button>
            </div>

            <section class="table-container"
                style="background-color: #1a1a1a; padding: 20px; border-radius: 8px; border: 1px solid #333;">
                <table style="width: 100%; text-align: left; border-collapse: collapse; color: white;">
                    <thead>
                        <tr style="border-bottom: 2px solid #ff9900;">
                            <th style="padding: 15px 10px;">ID</th>
                            <th style="padding: 15px 10px;">CÓDIGO</th>
                            <th style="padding: 15px 10px;">PRODUTO (SABOR/TAMANHO)</th>
                            <th style="padding: 15px 10px;">CATEGORIA</th>
                            <th style="padding: 15px 10px;">QTD. ESTOQUE</th>
                            <th style="padding: 15px 10px;">CUSTO</th>
                            <th style="padding: 15px 10px;">VENDA</th>
                            <th style="padding: 15px 10px;" text-align="center">AÇÕES</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-estoque-body">

                    </tbody>
                </table>
            </section>
        </main>
    </div>

    <div id="modal-produto"
        style="display: none; position: fixed; z-index: 1000; left: 0px; top: 0px; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.8);">
        <div
            style="background-color: #1a1a1a; margin: 5% auto; padding: 30px; border: 1px solid #ff9900; border-radius: 8px; width: 50%; color: white;">

            <div
                style="display: flex; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; margin-bottom: 20px;">
                <h3 style="color: #ff9900;">Cadastrar Novo Produto</h3>
                <span id="fechar-modal-produto"
                    style="color: #aaa; font-size: 28px; font-weight: bold; cursor: pointer; color: red;">&times;</span>
            </div>

            <form id="form-novo-produto" style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">

                <div style="grid-column: span 2;">
                    <label>Nome do Produto:</label><br>
                    <input type="text" id="cad-nome" required
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Código de Barras:</label><br>
                    <input type="text" id="cad-codigo"
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Categoria:</label><br>
                    <input type="text" id="cad-categoria" placeholder="Ex: Whey, Creatina"
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Sabor:</label><br>
                    <input type="text" id="cad-sabor"
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Tamanho/Peso:</label><br>
                    <input type="text" id="cad-tamanho" placeholder="Ex: 900g, 120 caps"
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Preço de Custo:</label><br>
                    <input type="number" step="0.01" id="cad-custo" required
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div>
                    <label>Preço de Venda:</label><br>
                    <input type="number" step="0.01" id="cad-venda" required
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div style="grid-column: span 2;">
                    <label>Alerta de Estoque Baixo:</label><br>
                    <input type="number" id="cad-estoque-minimo" value="5" required
                        style="width: 100%; padding: 10px; background: #222; border: 1px solid #444; color: white; border-radius: 4px;">
                </div>

                <div style="flex: 1;">
                    <label>Quantidade Inicial:</label>
                    <input type="number" id="cad-quantidade" value="0" required
                        style="width: 100%; padding: 8px; margin-top: 5px; background: #222; border: 1px solid #444; color: white;">
                </div>

                <div style="grid-column: span 2; text-align: right; margin-top: 15px;">
                    <button type="submit"
                        style="background-color: #4CAF50; color: white; padding: 12px 25px; border: none; border-radius: 5px; font-weight: bold; cursor: pointer; font-size: 16px;">💾
                        Salvar Produto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="estoque.js"></script>
</body>

</html>
