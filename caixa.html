<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa</title>
    <link rel="stylesheet" href="caixa.css">
</head>

<body>
    <header class="pdv-header">
        <div class="logo-texto">
            <span>BOMBADO</span> Esportes & Suplementos 🏆💪
        </div>
        <div class="info-operador">
            <span>Operador(a): <strong>Lauanda</strong></span>
            <span class="status-caixa">🟢 CAIXA LIVRE</span>
        </div>
    </header>

    <main class="pdv-container">
        <section class="painel-esquerdo">

            <div class="area-leitor">
                <label for="codigoBarras">CÓDIGO DE BARRAS / PESQUISA (F2) </label>
                <input type="text" id="codigoBarras" placeholder="Passe o leitor no produto..." autofocus>
            </div>

            <div class="area-cupom">
                <table class="tabela-itens">
                    <thead>
                        <tr>
                            <th>ITEM</th>
                            <th>DESCRIÇÃO DO PRODUTO</th>
                            <th>QUANTIDADE</th>
                            <th>VL. UNIDADE</th>
                            <th>SUBTOTAL</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>001</td>
                            <td>Whey Protein Isolado Integralmédica 900g</td>
                            <td>1</td>
                            <td>R$ 189,90</td>
                            <td>R$ 189,90</td>
                        </tr>
                        <tr>
                            <td>002</td>
                            <td>Meia Antiderrapante</td>
                            <td>2</td>
                            <td>R$ 35,00</td>
                            <td>R$ 70,00</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <aside class="painel-direito">

            <div class="area-total">
                <h2>TOTAL DA COMPRA</h2>
                <div class="valor-gigante">R$ 259,90</div>
            </div>

            <div class="area-pagamento">
                <h3>FORMA DE PAGAMENTO</h3>
                <div class="botoes-pagamento">
                    <button class="btn-pgto">💵 Dinheiro (F3)</button>
                    <button class="btn-pgto">💳 Cartão (F4)</button>
                    <button class="btn-pgto">📱 PIX (F5)</button>
                    <button class="btn-pgto fiado">📝 Fiado (F6)</button>
                </div>
            </div>

            <div class="area-acoes">
                <button class="btn-finalizar">✅ Finalizar Compra (Enter)</button>
                <button class="btn-cancelar">❌ Cancelar Compra (Esc)</button>
            </div>
        </aside>
    </main>
</body>

</html>
