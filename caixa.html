<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Caixa</title>
    <link rel="stylesheet" href="caixa.css">
    <script src="seguranca.js"></script>
</head>

<body>
    <header class="pdv-header">
        <div class="logo-texto">
            <span>BOMBADO</span> Esportes & Suplementos 🏆💪
        </div>
        <div class="info-operador">
            <span>Operador(a): <strong id="nome-operador">...</strong></span>
            <span class="status-caixa">🟢 CAIXA LIVRE</span>
        </div>
    </header>

    <main class="pdv-container">
        <section class="painel-esquerdo">

            <div class="area-leitor">
                <!-- ISSO APARECE NO PC -->
                <div class="leitor-desktop">
                    <label for="codigoBarras">CÓDIGO DE BARRAS / PESQUISA (F2) </label>
                    <input type="text" id="codigoBarras" placeholder="Passe o leitor no produto..." autofocus>
                </div>

                <!-- ISSO APARECE NO CELULAR -->
                <div class="leitor-mobile">
                    <label>PESQUISAR PRODUTO MANUALMENTE</label>
                    <button id="btn-pesquisa-mobile" class="btn-pesquisa-mobile">🔍 Tocar para Buscar Produto</button>
                </div>
            </div>

            <div class="area-cupom">
                <div class="tabela-scroll-container">
                    <table class="tabela-itens">
                        <thead class="thead-fixo">
                            <tr>
                                <th>ITEM</th>
                                <th>DESCRIÇÃO DO PRODUTO</th>
                                <th>QUANTIDADE</th>
                                <th>VL. UNIDADE</th>
                                <th>SUBTOTAL</th>
                            </tr>
                        </thead>
                        <tbody id="tabela-itens-body">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

        <aside class="painel-direito">

            <div class="area-total">
                <h2>TOTAL DA COMPRA</h2>
                <div class="valor-gigante" id="valor-total">R$ 0,00</div>
            </div>

            <div class="area-pagamento">
                <h3>FORMA DE PAGAMENTO</h3>
                <div class="botoes-pagamento">
                    <button class="btn-pgto" id="btn-dinheiro">💵 Dinheiro (F3)</button>
                    <button class="btn-pgto" id="btn-cartao">💳 Cartão (F4)</button>
                    <button class="btn-pgto" id="btn-pix">📱 PIX (F5)</button>
                    <button class="btn-pgto fiado" id="btn-fiado">📝 Fiado (F6)</button>
                </div>
            </div>

            <div class="areaDoCliente">
                <label class="nomeDoCliente">👤 Nome do Cliente:</label>
                <input type="text" class="btnNome" id="nome-cliente" autocomplete="off">
            </div>

            <div class="area-acoes">
                <button class="btn-finalizar">✅ Finalizar Compra (Enter)</button>
                <button class="btn-cancelar" id="botao-cancelar">❌ Cancelar Compra (Esc)</button>
            </div>
        </aside>
    </main>
    <div id="modal-pesquisa" class="modal-oculto">
        <div class="modal-conteudo">
            <div class="modal-header">
                <h2>🔎 Pesquisar Produto</h2>
                <span class="btn-fechar" id="fechar-modal">❌ (Esc)</span>
            </div>

            <input type="text" id="input-pesquisa-nome" placeholder="Digite o nome do Produto..." autocomplete="off">

            <div class="tabela-pesquisa-container">
                <table class="tabela-pesquisa">
                    <thead>
                        <tr>
                            <th>CÓDIGO</th>
                            <th>PRODUTO</th>
                            <th>ESTOQUE</th>
                            <th>PREÇO</th>
                        </tr>
                    </thead>
                    <tbody id="resultado-pesquisa-body"></tbody>
                </table>
            </div>
        </div>
    </div>
    <script src="caixa.js"></script>
</body>

</html>
