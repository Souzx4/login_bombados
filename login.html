<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombados Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<canvas id="fundo-particulas"
    style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-color: #0a0a0a;"></canvas>

<body>
    <div class="login-container">
        <div class="login-card">

            <div class="logo-area">
                <img src="img/logo1.png" alt="Bombado Logo">
            </div>

            <h1 class="area-acesso-title">ÁREA DE ACESSO</h1>

            <form id="login-form">

                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128100;</span>
                        <input type="text" id="usuario" placeholder="Digite seu usuário..." required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128274;</span>
                        <input type="password" id="senha" placeholder="Digite sua senha..." required>
                    </div>

                    <!-- para um caso futuro de recuperação de senha, caso o usuário esqueça a senha, ele pode clicar nesse link para recuperar a senha
                     
                    <div class="forgot-password">
                        <a href="#">Esqueci minha senha?</a>
                    </div>
                    
                    -->

                    <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </div>
    <script src="login.js?v=2"></script>

    <script>
        // ==========================================
        // EFEITO DE FUNDO: PARTÍCULAS CONECTADAS
        // ==========================================
        const canvas = document.getElementById('fundo-particulas');
        const ctx = canvas.getContext('2d');

        // Ajusta o tamanho pro tamanho da tela
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particulas = [];
        const corParticula = '#ff9900'; // Laranja Bombados!
        const quantidade = 80; // Quantidade de bolinhas

        class Particula {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.tamanho = Math.random() * 2.5 + 1;
                this.velocidadeX = (Math.random() * 1) - 0.5;
                this.velocidadeY = (Math.random() * 1) - 0.5;
            }

            atualizar() {
                // Move a bolinha
                this.x += this.velocidadeX;
                this.y += this.velocidadeY;

                // Bate na parede e volta
                if (this.x > canvas.width || this.x < 0) this.velocidadeX *= -1;
                if (this.y > canvas.height || this.y < 0) this.velocidadeY *= -1;
            }

            desenhar() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.tamanho, 0, Math.PI * 2);
                ctx.fillStyle = corParticula;
                ctx.fill();
            }
        }

        function iniciarParticulas() {
            particulas = [];
            for (let i = 0; i < quantidade; i++) {
                particulas.push(new Particula());
            }
        }

        function animar() {
            requestAnimationFrame(animar);
            ctx.clearRect(0, 0, canvas.width, canvas.height); // Limpa o quadro antigo

            for (let i = 0; i < particulas.length; i++) {
                particulas[i].atualizar();
                particulas[i].desenhar();

                // Conecta as linhas se chegarem perto umas das outras
                for (let j = i; j < particulas.length; j++) {
                    const dx = particulas[i].x - particulas[j].x;
                    const dy = particulas[i].y - particulas[j].y;
                    const distancia = Math.sqrt(dx * dx + dy * dy);

                    if (distancia < 120) { // Distância do "fio"
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(255, 153, 0, ${1 - distancia / 120})`; // Opacidade diminui ao afastar
                        ctx.lineWidth = 1;
                        ctx.moveTo(particulas[i].x, particulas[i].y);
                        ctx.lineTo(particulas[j].x, particulas[j].y);
                        ctx.stroke();
                    }
                }
            }
        }

        // se o usuario redimensionar a tela, ajusta o canvas
        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            iniciarParticulas(); // Reinicia as partículas para se adaptarem ao novo tamanho
        });

        iniciarParticulas();
        animar();
    </script>

</body>

</html>
