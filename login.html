<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombados Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<canvas id="fundo-particulas" style="position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; z-index: -1; background-color: #0a0a0a;"></canvas>

<body>
    <div class="login-container">
        <div class="login-card">

            <div class="logo-area">
                <img src="img/logo1.png" alt="Bombado Logo">
            </div>

            <h1 class="area-acesso-title">ÁREA DE ACESSO</h1>

            <form id="login-form">

                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128100;</span>
                        <input type="text" id="usuario" placeholder="Digite seu usuário..." required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128274;</span>
                        <input type="password" id="senha" placeholder="Digite sua senha..." required>
                    </div>

                    <!-- para um caso futuro de recuperação de senha, caso o usuário esqueça a senha, ele pode clicar nesse link para recuperar a senha
                     
                    <div class="forgot-password">
                        <a href="#">Esqueci minha senha?</a>
                    </div>
                    
                    -->

                    <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>

    <script>
        // ==========================================
        // EFEITO DE FUNDO: PARTÍCULAS CONECTADAS
        // ==========================================
        const canvas = document.getElementById('fundo-particulas');
        const ctx = canvas.getContext('2d');

        // ajuste para o tamanho da tela
        canvas.windth = window.innerWidth;
        canvas.height = window.innerHeight;

        let particulas = [];
        const corParticulas = '#ff9900';
        const quantidade = 80;

        class Particulas {
            constructor(){
                this.x = Math.random() * canvas.windth;
            }
        }
    </script>

</body>

</html>
