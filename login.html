<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bombados Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="login-container">
        <div class="login-card">

            <div class="logo-area">
                <video autoplay loop muted playsinline>
                    <source src="img/videoLogo.mp4" type="video/mp4">
                    Seu navegador não suporta o elemento de video.
                </video>
            </div>

            <h1 class="area-acesso-title">ÁREA DE ACESSO</h1>

            <form id="login-form">

                <div class="input-group">
                    <label for="usuario">Usuário</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128100;</span>
                        <input type="text" id="usuario" placeholder="Digite seu usuário..." required>
                    </div>
                </div>

                <div class="input-group">
                    <label for="senha">Senha</label>
                    <div class="input-wrapper">
                        <span class="icon">&#128274;</span>
                        <input type="password" id="senha" placeholder="Digite sua senha..." required>
                    </div>

                    <!-- para um caso futuro de recuperação de senha, caso o usuário esqueça a senha, ele pode clicar nesse link para recuperar a senha
                     
                    <div class="forgot-password">
                        <a href="#">Esqueci minha senha?</a>
                    </div>
                    
                    -->

                    <button type="submit" class="btn-entrar">ENTRAR</button>
            </form>
        </div>
    </div>
    <script src="login.js"></script>

</body>

</html>
